<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QA Hell</title>
<style>
  body{
    margin:0;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;

    /* ФОН ВОКРУГ ПОЛЯ */
    background-image: url("assets/background.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    /* если фон светлый — чуть затемним подложку */
    position: relative;
    min-height: 100vh;
  }

  /* затемняющая вуаль для читаемости */
  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    pointer-events: none;
  }

  .wrap{
    position: relative; /* поверх вуали */
    max-width: 980px;
    margin: 0 auto;
    padding: 14px;
  }

  canvas{
    display:block;

    /* Поле меньше примерно на 20% визуально */
    width: 80%;
    height: auto;

    /* ВНУТРЕННИЙ ФОН ПОЛЯ */
    background: rgba(10,10,12,0.75);

    margin: 14px auto 0;
    border:2px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    touch-action: manipulation;
  }

  .muted{ color: rgba(255,255,255,0.75); margin-top: 6px; }
</style>
</head>

<body>
  <div class="wrap">
    <h1>QA Hell</h1>
    <div class="muted">Tip: click/tap fast. Refresh page to restart.</div>

    <!-- Уменьшили реальное разрешение канваса тоже примерно на 20% -->
    <canvas id="game" width="720" height="432"></canvas>
  </div>

<script>
/* =========================
   SETTINGS (крутилки)
   ========================= */

// Text overlay (center screen)
const RULE_TEXT = "Click cursed shoes before they flood the screen";
const RULE_FONT_SIZE = 24;
const COUNTDOWN_FONT_SIZE = 22;
const RULE_Y_OFFSET = -10;
const COUNTDOWN_Y_OFFSET = 30;

// Game rules
const MAX_BUGS_ON_SCREEN = 15;

// Bug visuals
const IMAGE_SCALE = 1.55;     // <— скейл ботинка
const BASE_BUG_SIZE = 120;    // базовый размер до скейла

// Spawn speed (geometric progression)
const SPAWN_INTERVAL_START_MS = 900;
const SPAWN_INTERVAL_MULTIPLIER = 0.93; // <1 быстрее
const SPAWN_INTERVAL_MIN_MS = 180;

// Defeat window (image size tweak)
const DEFEAT_IMG_W = 520;
const DEFEAT_IMG_H = 300;
const DEFEAT_IMG_Y_OFFSET = -40;

// Assets
const DEFEAT_SRC = "assets/defeat.png";
const SHOE_COUNT = 15;
const SHOE_PREFIX = "assets/shoe";

/* =========================
   GAME CODE
   ========================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bugs = [];
let score = 0;
let gameOver = false;

// scaled bug size
const BUG_SIZE = Math.max(10, Math.floor(BASE_BUG_SIZE * IMAGE_SCALE));

// --------- Asset preloading (no start until loaded) ---------
const defeat = new Image();
const shoes = [];

let assetsToLoad = 1 + SHOE_COUNT; // defeat + shoes
let assetsLoaded = 0;
let readyToStart = false;

function markLoaded(){
  assetsLoaded++;
  if(assetsLoaded >= assetsToLoad){
    readyToStart = true;
    startCountdown();
  }
}

defeat.onload = markLoaded;
defeat.onerror = markLoaded;
defeat.src = DEFEAT_SRC;

for(let i=1; i<=SHOE_COUNT; i++){
  const img = new Image();
  img.onload = markLoaded;
  img.onerror = markLoaded;
  img.src = `${SHOE_PREFIX}${i}.png`;
  shoes.push(img);
}

// --------- Countdown ---------
let countdown = 3;
let countdownActive = false;
let countdownTimerId = null;

// Loading dots animation
let loadingDots = 0;
let loadingDotsTimer = setInterval(() => {
  loadingDots = (loadingDots + 1) % 4; // 0..3
}, 350);

function startCountdown(){
  if(countdownActive || gameOver) return;

  // отключаем анимацию loading, больше не нужна
  if(loadingDotsTimer){
    clearInterval(loadingDotsTimer);
    loadingDotsTimer = null;
  }

  countdown = 3;
  countdownActive = true;

  countdownTimerId = setInterval(() => {
    countdown--;
    if(countdown <= 0){
      clearInterval(countdownTimerId);
      countdownTimerId = null;
      countdownActive = false;
      startSpawning();
    }
  }, 1000);
}

// --------- Spawn control (geometric progression) ---------
let spawnInterval = SPAWN_INTERVAL_START_MS;
let spawnTimerId = null;

function startSpawning(){
  stopSpawning();
  scheduleNextSpawn();
}

function stopSpawning(){
  if(spawnTimerId !== null){
    clearTimeout(spawnTimerId);
    spawnTimerId = null;
  }
}

function scheduleNextSpawn(){
  if(gameOver) return;

  spawnTimerId = setTimeout(() => {
    spawnBug();
    spawnInterval = Math.max(SPAWN_INTERVAL_MIN_MS, Math.floor(spawnInterval * SPAWN_INTERVAL_MULTIPLIER));
    scheduleNextSpawn();
  }, spawnInterval);
}

function randi(n){ return Math.floor(Math.random() * n); }

function spawnBug(){
  if(gameOver) return;

  const img = shoes[randi(shoes.length)];

  const x = Math.random() * (canvas.width  - BUG_SIZE);
  const y = Math.random() * (canvas.height - BUG_SIZE);

  bugs.push({ x, y, size: BUG_SIZE, img });

  if(bugs.length > MAX_BUGS_ON_SCREEN){
    gameOver = true;
    stopSpawning();
    if(countdownTimerId) clearInterval(countdownTimerId);
  }
}

// --------- Input / hit test ---------
function pointerPos(evt){
  const rect = canvas.getBoundingClientRect();
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;

  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;

  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY
  };
}

function tryHit(mx, my){
  if(gameOver) return;
  if(!readyToStart || countdownActive) return;

  for(let i = bugs.length - 1; i >= 0; i--){
    const b = bugs[i];
    const hit = (mx >= b.x && mx <= b.x + b.size && my >= b.y && my <= b.y + b.size);
    if(hit){
      bugs.splice(i, 1);
      score += 1;
      return;
    }
  }
}

canvas.addEventListener("click", (e) => {
  const p = pointerPos(e);
  tryHit(p.x, p.y);
});

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  const p = pointerPos(e);
  tryHit(p.x, p.y);
}, { passive: false });

// --------- Drawing ---------
function clearField(){
  // Игровое поле НЕ использует background.png, оно однотонное и прозрачное
  ctx.clearRect(0,0,canvas.width, canvas.height);

  // лёгкая подложка (чтобы, если clearRect оставляет прозрачность, всё равно читалось)
  ctx.fillStyle = "rgba(10,10,12,0.35)";
  ctx.fillRect(0,0,canvas.width, canvas.height);
}

function drawHUD(){
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = "20px Arial";
  ctx.textAlign = "left";
  ctx.fillText(`Score: ${score}`, 14, 28);

  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.font = "14px Arial";
  ctx.fillText(`Bugs: ${bugs.length}/${MAX_BUGS_ON_SCREEN}`, 14, 48);
}

function drawBugs(){
  for(const b of bugs){
    ctx.drawImage(b.img, b.x, b.y, b.size, b.size);
  }
}

function drawCenterOverlay(){
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(0,0,canvas.width, canvas.height);

  ctx.textAlign = "center";

  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = `${RULE_FONT_SIZE}px Arial`;
  ctx.fillText(RULE_TEXT, canvas.width/2, canvas.height/2 + RULE_Y_OFFSET);

  ctx.fillStyle = "rgba(255,255,255,0.78)";
  ctx.font = `${COUNTDOWN_FONT_SIZE}px Arial`;

  let line = "";
  if(!readyToStart){
    const dots = ".".repeat(loadingDots);
    line = `Loading${dots}`;
  } else if(countdownActive){
    line = `Starting in: ${countdown}`;
  }

  if(line){
    ctx.fillText(line, canvas.width/2, canvas.height/2 + COUNTDOWN_Y_OFFSET);
  }

  ctx.textAlign = "left";
}

function drawGameOver(){
  ctx.fillStyle = "rgba(0,0,0,0.60)";
  ctx.fillRect(0,0,canvas.width, canvas.height);

  const w = DEFEAT_IMG_W;
  const h = DEFEAT_IMG_H;
  const x = (canvas.width - w) / 2;
  const y = (canvas.height - h) / 2 + DEFEAT_IMG_Y_OFFSET;

  if(defeat.complete && defeat.naturalWidth > 0){
    ctx.drawImage(defeat, x, y, w, h);
  }

  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(255,255,255,0.96)";
  ctx.font = "56px Arial";
  ctx.fillText("QA FAILED", canvas.width/2, canvas.height/2 + 120);

  ctx.fillStyle = "rgba(255,255,255,0.75)";
  ctx.font = "18px Arial";
  ctx.fillText("Refresh the page to restart", canvas.width/2, canvas.height/2 + 155);

  ctx.textAlign = "left";
}

function loop(){
  clearField();

  if(!gameOver){
    if(readyToStart && !countdownActive){
      drawBugs();
      drawHUD();
    } else {
      drawCenterOverlay();
      drawHUD();
    }
  } else {
    drawBugs();
    drawHUD();
    drawGameOver();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
