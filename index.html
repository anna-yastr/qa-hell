<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA Hell</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrap">
    <header class="top">
      <div class="titleBlock">
        <h1>QA Hell</h1>
        <div class="muted">Tip: click/tap fast. You lose if the screen floods.</div>
      </div>
    </header>

    <div class="gameArea">
      <canvas id="game" width="720" height="432"></canvas>
      <button id="restartBtn" class="restartOverlay" type="button">Restart</button>
    </div>
  </div> <!-- ВАЖНО: закрыли wrap -->

  <script src="game.js"></script>
</body>
</html>
