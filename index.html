<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QA Hell</title>
<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

canvas{
    background:#222;
    margin-top:20px;
    border:2px solid #444;
}
</style>
</head>

<body>

<h1>QA Hell</h1>
<p>Click bugs before they fill the screen</p>

<canvas id="game" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let bugs = []
let score = 0

function spawnBug(){
    bugs.push({
        x: Math.random()*750,
        y: Math.random()*450,
        size: 20
    })
}

setInterval(spawnBug, 800)

canvas.addEventListener("click", e => {

    const rect = canvas.getBoundingClientRect()
    const mx = e.clientX - rect.left
    const my = e.clientY - rect.top

    bugs = bugs.filter(b => {

        const hit =
        mx > b.x &&
        mx < b.x + b.size &&
        my > b.y &&
        my < b.y + b.size

        if(hit) score++

        return !hit
    })
})

function draw(){

    ctx.clearRect(0,0,800,500)

    ctx.fillStyle="white"
    ctx.font="20px Arial"
    ctx.fillText("Score: "+score,10,25)

    ctx.fillStyle="red"

    bugs.forEach(b=>{
        ctx.fillRect(b.x,b.y,b.size,b.size)
    })

    if(bugs.length > 25){
        ctx.fillStyle="white"
        ctx.font="50px Arial"
        ctx.fillText("QA FAILED",250,250)
    }

    requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
